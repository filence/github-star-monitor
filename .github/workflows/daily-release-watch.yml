name: Daily Starred Release Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: daily-starred-release-watch
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check
        run: npm run check

      - name: Run monitor
        env:
          GH_STAR_MONITOR_TOKEN: ${{ secrets.GH_STAR_MONITOR_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SEND_EMPTY_SUMMARY: ${{ vars.SEND_EMPTY_SUMMARY || 'false' }}
          LLM_ENABLED: ${{ vars.LLM_ENABLED || 'false' }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
          LLM_TIMEOUT_MS: ${{ vars.LLM_TIMEOUT_MS || '20000' }}
          LLM_TEMPERATURE: ${{ vars.LLM_TEMPERATURE || '0.2' }}
          LLM_MAX_NOTES_CHARS: ${{ vars.LLM_MAX_NOTES_CHARS || '12000' }}
        run: npm start

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update monitor state"
          git push
